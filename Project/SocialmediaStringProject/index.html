
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>String Mini Projects</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

    <div class="container mt-5">

        <div class="row g-4">

            <!-- Username Generator -->
            <div class="col-md-6">

                <div class="card shadow p-4">

                    <h3 class="text-center mb-3">
                        Username Generator
                    </h3>

                    <input type="text"
                        id="name"
                        class="form-control"
                        placeholder="Enter Full Name">

                    <button class="btn btn-dark mt-3 w-100"
                        onclick="createUsername()">

                        Generate Username
                    </button>

                    <h5 class="text-success mt-3 text-center"
                        id="username">
                    </h5>

                </div>

            </div>





            <!-- Hashtag Generator -->
            <div class="col-md-6">

                <div class="card shadow p-4">

                    <h3 class="text-center mb-3">
                        Hashtag Generator
                    </h3>

                    <input type="text"
                        id="post"
                        class="form-control"
                        placeholder="Enter Post Text">

                    <button class="btn btn-primary mt-3 w-100"
                        onclick="createHashtag()">

                        Generate Hashtag
                    </button>

                    <h5 class="text-primary mt-3 text-center"
                        id="hashtag">
                    </h5>

                </div>

            </div>





            <!-- Banking Account Mask -->
            <div class="col-md-12">

                <div class="card shadow p-4">

                    <h3 class="text-center mb-3">
                        Banking Account Masking
                    </h3>

                    <input type="text"
                        id="account"
                        class="form-control"
                        placeholder="Enter Account Number">

                    <button class="btn btn-success mt-3 w-100"
                        onclick="maskAccount()">

                        Mask Account
                    </button>

                    <h5 class="text-danger mt-3 text-center"
                        id="masked">
                    </h5>

                </div>

            </div>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
